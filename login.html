<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ConectandoHogares</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="icono.ico">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">Conectando<span>Hogares</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-container">
        <div class="login-box">
            <h2 id="form-title">Iniciar Sesión</h2>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn-primary" id="submit-btn">Entrar</button>
            </form>

            <div class="divider">
                <span>O</span>
            </div>

            <button type="button" id="google-login-btn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
                Continuar con Google
            </button>

            <p class="toggle-form">
                <span id="toggle-text">¿No tienes cuenta?</span> 
                <a href="#" id="toggle-link">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 ConectandoHogares</p>
        </div>
    </footer>

    <!-- Firebase y lógica de Auth como módulo -->
    <script type="module" src="login.js"></script>
</body>
</html>
